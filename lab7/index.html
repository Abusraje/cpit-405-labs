<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsplash Search</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Unsplash API Search</h1>

    <div class="search-box">
        <input type="text" id="query" placeholder="Search images...">
        <button onclick="searchXHR()">Search using XHR</button>
        <button onclick="searchFetch()">Search using Fetch</button>
        <button onclick="searchAsync()">Search using Async/Await</button>
    </div>

    <div id="gallery"></div>
</div>

<script src="script.js"></script>
</body>
</html>
